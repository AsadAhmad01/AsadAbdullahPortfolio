<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Asad Abdullah logo">
  <defs>
    <linearGradient id="aa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d1428"/>
  <rect width="64" height="64" rx="14" fill="url(#aa-grad)" fill-opacity="0.08"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" stroke="url(#aa-grad)" stroke-opacity="0.4"/>
  <!-- AA Monogram -->
  <text
    x="32"
    y="44"
    font-family="Outfit, Inter, sans-serif"
    font-weight="900"
    font-size="28"
    text-anchor="middle"
    fill="url(#aa-grad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >AA</text>
</svg>
